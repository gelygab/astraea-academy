<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astraea Academy - Welcome</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Galaxy Background Canvas -->
    <canvas id="galaxy-canvas"></canvas>
    
    <!-- Main Container - Scene 1 (Space) -->
    <div class="container" id="scene-1">
        <!-- Astraea Academy Logo Container -->
        <div class="logo-container" id="logo-container">
            <div class="logo-wrapper">
                <img src="images/AA_Font.png" alt="Astraea Academy" class="academy-logo" id="academy-logo">
                <!-- Floating Sparkles -->
                <div class="sparkles-container">
                    <div class="sparkle sparkle-1">✦</div>
                    <div class="sparkle sparkle-2">✧</div>
                    <div class="sparkle sparkle-3">✦</div>
                    <div class="sparkle sparkle-4">✧</div>
                    <div class="sparkle sparkle-5">✦</div>
                    <div class="sparkle sparkle-6">✧</div>
                </div>
            </div>
        </div>

        <!-- ID Badge -->
        <div class="id-badge-container" id="id-badge">
            <div class="lanyard">
                <div class="lanyard-strap"></div>
                <div class="lanyard-clip"></div>
            </div>
            <div class="badge-card">
                <div class="badge-content"></div>
            </div>
        </div>

        <!-- Custom Cursor -->
        <div class="custom-cursor" id="cursor"></div>
    </div>

       <!-- Scene 2: Lockers & School -->
    <div class="scene-2" id="scene-2">
        <!-- School Facade (100% solid, bottom layer) -->
        <div class="school-facade">
            <img src="images/AA_School.png" alt="Astraea Academy School" class="school-image">
        </div>

        <!-- Lockers (Semi-transparent overlay on TOP of school) -->
        <div class="lockers-bg">
            <img src="images/AA_Locker.png" alt="Lockers" class="locker-image">
        </div>

        <!-- Single Pink Top Bar -->
        <div class="pink-bar"></div>
        
        <!-- Floating AA Font Logo -->
        <div class="floating-logo-container">
            <img src="images/AA_Font.png" alt="Astraea Academy" class="floating-logo">
                <div class="floating-sparkles">
                <div class="f-spark f-spark-1">✦</div>
                <div class="f-spark f-spark-2">✧</div>
                <div class="f-spark f-spark-3">✦</div>
                <div class="f-spark f-spark-4">✧</div>
            </div>
        </div>

        <!-- Login Card (Lower position) -->
            <img src="images/AA_Scrapbook.png" alt="" class="scrapbook-decoration">
            <img src="images/AA_Cloud.png" alt="" class="cloud-image">

            <div class="login-card">
            <div class="card-header">
                <div class="logo-circle">
                    <img src="images/AA_Logo.png" alt="Astraea Academy Logo" class="card-logo">
                </div>
            </div>
            <div class="card-body">
                <h2 class="greeting">Hi, Stellars!</h2>
                <p class="instruction">Please click or tap your destination.</p>
                <div class="buttons">
                    <button class="btn btn-student" onclick="navigateTo('student')">Student</button>
                    <button class="btn btn-faculty" onclick="navigateTo('faculty')">Faculty</button>
                    <button class="btn btn-admin" onclick="navigateTo('admin')">Admin</button>
                </div>
            </div>
            </div> 
    </div>

    <script src="index.js"></script>
    
</body>
</html>
